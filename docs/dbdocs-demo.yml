# dbdocs config for the live demo site, built from the jaffle_shop test
# fixtures. `dbdocs deploy <version> --alias latest` writes a versioned SPA tree
# into docs/demo/, which lives inside the mkdocs source tree, so `mkdocs build`
# copies it verbatim and mike publishes it at /latest/demo/latest/. This is NOT
# the docs site itself (that's mkdocs + mike); it's a static SPA bundled alongside.

site_name: dbdocs demo — jaffle_shop
site_description: A live dbdocs site built from the jaffle_shop dbt project
site_url: https://dbdocs.datnguye.me/latest/demo/latest/
site_author: Dat Nguyen
project_name: jaffle_shop
repo_name: datnguye/dbt-docs
repo_url: https://github.com/datnguye/dbt-docs

# Read the committed dbt artifacts straight from the test fixtures.
target_dir: tests/fixtures/jaffle_shop

# Render this repo's README on the overview. Its relative image/link paths are
# rewritten by the SPA to absolute GitHub raw/blob URLs (via repo_url), so they
# resolve on the deployed site.
readme: README.md

# Write the SPA into the mkdocs source tree so `mkdocs build` bundles it and
# mike publishes it at /latest/demo/latest/. This path is gitignored (/docs/demo).
output_dir: docs/demo

# dbterd configs
dbterd:
  algo: model_contract
  entity_name_format: table
  select:
    - exact:model.jaffle_shop.locations
    - exact:model.jaffle_shop.orders
    - wildcard:model.jaffle_shop.dim_*
    - wildcard:model.jaffle_shop.fct_*