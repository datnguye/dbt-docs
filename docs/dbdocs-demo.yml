# dbdocs config for the live demo site, built from the jaffle_shop test
# fixtures. `dbdocs deploy <version> --alias latest` writes a versioned SPA tree
# into docs/demo/, which lives inside the mkdocs source tree, so `mkdocs build`
# copies it verbatim and mike publishes it at /latest/demo/latest/. This is NOT
# the docs site itself (that's mkdocs + mike); it's a static SPA bundled alongside.

site_name: dbdocs demo — jaffle_shop
site_description: A live dbdocs site built from the jaffle_shop dbt project
site_url: https://dbdocs.datnguye.me/latest/demo/latest/
site_author: Dat Nguyen
project_name: jaffle_shop
repo_name: datnguye/dbt-docs
repo_url: https://github.com/datnguye/dbt-docs

# Read the committed dbt artifacts straight from the test fixtures.
target_dir: tests/fixtures/jaffle_shop

# Render this repo's README on the overview. Its relative image/link paths are
# rewritten by the SPA to absolute GitHub raw/blob URLs (via repo_url), so they
# resolve on the deployed site.
readme: README.md

# Write the SPA into the mkdocs source tree so `mkdocs build` bundles it and
# mike publishes it at /latest/demo/latest/. This path is gitignored (/docs/demo).
output_dir: docs/demo

# The Health Check page is always built from the manifest (the six DPE
# dimensions). The per-test pass/fail detail comes from run_results.json, which
# lives alongside the artifacts in target_dir, so the default
# <target_dir>/run_results.json resolves — no explicit run_results needed.
#
# The health rule engine is configurable. Every threshold below is set to its
# dbt-project-evaluator default; tune them, disable individual rules or whole
# dimensions, or load custom rules. All built-in rules are listed (commented)
# under `disable` for reference.
health:
  # Rule thresholds (DPE defaults shown).
  thresholds:
    model_fanout: 3              # > N direct model children is flagged
    too_many_joins: 7            # >= N upstream dependencies is flagged
    chained_view_dependencies: 4 # >= N-deep view/ephemeral chain is flagged
    documentation_coverage: 100  # < N% of models documented is flagged

  # Disable individual rules by name (none disabled in the demo). The full set
  # (one-to-one with the dbt-project-evaluator rules):
  disable: []
    # testing:
    #   - test_coverage
    #   - missing_primary_key_tests
    #   - missing_source_freshness
    # modeling:
    #   - direct_join_to_source
    #   - downstream_models_dependent_on_source
    #   - duplicate_sources
    #   - hard_coded_references
    #   - model_fanout
    #   - multiple_sources_joined
    #   - rejoining_of_upstream_concepts
    #   - root_models
    #   - source_fanout
    #   - staging_dependent_on_staging
    #   - staging_dependent_on_marts_or_intermediate
    #   - unused_sources
    #   - too_many_joins
    # documentation:
    #   - documentation_coverage
    #   - undocumented_models
    #   - undocumented_sources
    #   - undocumented_source_tables
    # structure:
    #   - model_naming_conventions
    #   - model_directories
    #   - source_directories
    #   - test_directories
    # performance:
    #   - chained_view_dependencies
    #   - exposure_parents_materializations
    # governance:
    #   - public_models_without_contracts
    #   - undocumented_public_models
    #   - exposures_dependent_on_private_models

  # Disable whole dimensions (none in the demo). One of: testing, modeling,
  # documentation, structure, performance, governance.
  disable_dimensions: []

  # Load custom rules from a dotted module path; the module calls
  # `register_rule("<dimension>", fn)` at import time. Installed packages can also
  # ship rules via the `dbdocs.health_rules` entry-point group.
  # rules_module: my_project.dbdocs_health_rules

# dbterd configs
dbterd:
  algo: model_contract
  entity_name_format: table
  select:
    - exact:model.jaffle_shop.locations
    - exact:model.jaffle_shop.orders
    - wildcard:model.jaffle_shop.dim_*
    - wildcard:model.jaffle_shop.fct_*