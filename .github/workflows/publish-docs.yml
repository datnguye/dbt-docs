name: Build and Deploy Docs Site

on:
  workflow_dispatch:
    inputs:
      version:
        description: Document version e.g. 1.1, 1.2
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/cache@v5
        with:
          key: ${{ github.ref }}
          path: .cache

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Cache UV dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ubuntu-3.10-uv-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ubuntu-3.10-uv-

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build the versioned live demo from jaffle_shop fixtures
        run: uv run dbdocs -c docs/dbdocs-demo.yml deploy --version ${{ inputs.version }} --alias latest

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Publish site
        run: uv run mike deploy --push --update-aliases ${{ inputs.version }} latest
